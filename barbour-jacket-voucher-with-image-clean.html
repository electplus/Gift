<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbour Jacket Gift Voucher</title>
  <style>
    :root { --bg:#f5f1e8; --ink:#1c1a17; --muted:#6e665d; --line:#c8bda9; --accent:#233126; --shadow:0 24px 60px rgba(28,26,23,.14); }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Georgia,'Times New Roman',serif;color:var(--ink);background:radial-gradient(circle at top, rgba(255,255,255,.75), transparent 35%), linear-gradient(180deg,#ebe3d2 0%,var(--bg) 100%);display:grid;place-items:center;padding:24px}
    .shell{width:min(1120px,100%)}
    .hero{ text-align:center;background:rgba(251,248,241,.86);border:1px solid rgba(111,95,72,.18);border-radius:28px;box-shadow:var(--shadow);padding:36px 24px;backdrop-filter:blur(8px)}
    .eyebrow{margin:0 0 12px;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
    h1{margin:0;font-size:clamp(2rem,5vw,3.8rem);line-height:1.05;font-weight:700}
    .sub{margin:16px auto 0;max-width:42rem;font-size:clamp(1rem,2vw,1.15rem);line-height:1.7;color:var(--muted)}
    .reveal-btn{margin-top:28px;appearance:none;border:0;background:var(--accent);color:#f8f4ea;padding:14px 28px;border-radius:999px;font-size:1rem;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:transform 180ms ease,opacity 180ms ease;box-shadow:0 14px 30px rgba(35,49,38,.24)}
    .voucher-wrap{margin-top:24px;display:none}.voucher-wrap.visible{display:block;animation:fadeUp 600ms ease forwards}
    .voucher{position:relative;overflow:hidden;background:linear-gradient(180deg,#f9f5ee 0%,#f2ebdf 100%);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}
    .voucher-grid{display:grid;grid-template-columns:1fr 1.05fr;min-height:560px}
    .voucher-photo{position:relative;background:linear-gradient(160deg,#d8cfbf 0%,#f2ebdf 100%);display:grid;place-items:center;padding:34px}
    .voucher-photo::before{content:'';position:absolute;inset:20px;border:1px solid rgba(142,124,97,.35);border-radius:22px;background:repeating-linear-gradient(45deg, rgba(35,49,38,.035) 0, rgba(35,49,38,.035) 12px, transparent 12px, transparent 24px)}
    .voucher-photo img{position:relative;z-index:1;width:min(92%,430px);height:auto;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.18);object-fit:cover;border:1px solid rgba(0,0,0,.08)}
    .voucher-main{position:relative;padding:56px 48px;display:flex;flex-direction:column;justify-content:center}
    .voucher-main::before,.voucher-main::after{content:'';position:absolute;inset:18px;border:1px solid rgba(142,124,97,.45);border-radius:20px;pointer-events:none}
    .voucher-main::after{inset:auto;top:0;right:0;width:38%;height:100%;background:linear-gradient(135deg, rgba(35,49,38,.06), rgba(35,49,38,.01));clip-path:polygon(18% 0,100% 0,100% 100%,0 100%);border:0;border-left:1px solid rgba(142,124,97,.24);border-radius:0}
    .content{position:relative;z-index:1}
    .label{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
    .voucher h2{margin:0;font-size:clamp(2rem,4vw,3.6rem);line-height:.98;letter-spacing:.04em}
    .voucher h3{margin:20px 0 0;font-size:clamp(1.15rem,2vw,1.6rem);font-weight:400;line-height:1.4;max-width:24ch}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @media (max-width:860px){.voucher-grid{grid-template-columns:1fr}.voucher-main,.voucher-photo{padding:24px}.voucher-main{padding-top:34px}.voucher-photo img{width:min(100%,380px)}.voucher-main::after{width:100%;height:28%;top:auto;bottom:0;clip-path:none;border-left:0;border-top:1px solid rgba(142,124,97,.24)}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">A gift to unwrap</p>
      <h1>There’s something special waiting for you.</h1>
      <button class="reveal-btn" id="revealBtn" type="button" aria-controls="voucherPanel" aria-expanded="false">Reveal</button>
    </section>

    <section class="voucher-wrap" id="voucherPanel" aria-hidden="true">
      <article class="voucher">
        <div class="voucher-grid">
          <div class="voucher-photo">
            <img src="https://user-gen-media-assets.s3.amazonaws.com/gpt4o_images/327805ea-6ca9-41ed-bae0-e1a6ac79d0a8.png" alt="Barbour Transport Waxed Jacket voucher preview" />
          </div>
          <div class="voucher-main">
            <div class="content">
              <div class="label">Gift Voucher</div>
              <h2>For a Barbour<br>Transport Waxed Jacket</h2>
              <h3>A classic piece of outerwear with heritage detailing and timeless utility.</h3>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>
  <script>
    const button = document.getElementById('revealBtn');
    const panel = document.getElementById('voucherPanel');
    button.addEventListener('click', () => {
      panel.classList.add('visible');
      panel.setAttribute('aria-hidden', 'false');
      button.setAttribute('aria-expanded', 'true');
      button.textContent = 'Revealed';
      button.disabled = true;
      button.style.opacity = '0.85';
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  </script>
</body>
</html>
